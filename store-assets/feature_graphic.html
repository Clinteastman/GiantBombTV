<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1024px;
    height: 500px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
}
.container {
    display: flex;
    align-items: center;
    gap: 48px;
}
.icon {
    width: 200px;
    height: 200px;
    border-radius: 40px;
    flex-shrink: 0;
}
.text {
    color: #fff;
}
.title {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
}
.title .tv {
    color: #e53935;
}
.subtitle {
    font-size: 22px;
    color: #aaa;
    margin-top: 12px;
    font-weight: 400;
}
.features {
    display: flex;
    gap: 24px;
    margin-top: 24px;
}
.feature {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 16px;
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
}
</style>
</head>
<body>
<div class="container">
    <img src="app_icon_512x512.png" class="icon" />
    <div class="text">
        <div class="title">Giant Bomb <span class="tv">TV</span></div>
        <div class="subtitle">Stream Giant Bomb on any screen</div>
        <div class="features">
            <span class="feature">Phone</span>
            <span class="feature">Android TV</span>
            <span class="feature">Fire TV</span>
            <span class="feature">Chromecast</span>
        </div>
    </div>
</div>
</body>
</html>
